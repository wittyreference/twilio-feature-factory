; ABOUTME: Minimal dialplan for SIP trunk testing with Twilio.
; ABOUTME: Handles inbound from Twilio (termination) and outbound to Twilio (origination).

[general]
static=yes
writeprotect=yes

; === Inbound from Twilio (Termination test — Phase A) ===

[from-twilio]
; E.164 format (+1NXXNXXXXXX) — Twilio sends numbers with + prefix
; Custom sounds use absolute path — Asterisk search path doesn't include volume-mounted subdirs
exten => _+.,1,Answer()
 same => n,Wait(2)
 same => n,Playback(/usr/share/asterisk/sounds/custom/careless-whisper)
 same => n,Wait(1)
 same => n,Hangup()

; Fallback without + prefix
exten => _X.,1,Answer()
 same => n,Wait(2)
 same => n,Playback(/usr/share/asterisk/sounds/custom/careless-whisper)
 same => n,Wait(1)
 same => n,Hangup()

; Extension 600: Echo test — caller hears their own audio (latency test)
exten => 600,1,Answer()
 same => n,Echo()

; Extension 700: DTMF test — reads 4 digits, says them back
exten => 700,1,Answer()
 same => n,Read(digits,,4)
 same => n,SayDigits(${digits})
 same => n,Hangup()

; Extension 800: Record and playback test
exten => 800,1,Answer()
 same => n,Playback(beep)
 same => n,Record(/tmp/test-recording.wav,3,30,q)
 same => n,Playback(/tmp/test-recording)
 same => n,Hangup()

; === Outbound via Twilio Trunk (Origination test — Phase B) ===

[outbound-via-twilio]
exten => _+1NXXNXXXXXX,1,NoOp(Dialing ${EXTEN} via Twilio trunk)
 same => n,Dial(PJSIP/${EXTEN}@twilio-trunk,60)
 same => n,Hangup()

exten => _1NXXNXXXXXX,1,NoOp(Dialing +${EXTEN} via Twilio trunk)
 same => n,Dial(PJSIP/+${EXTEN}@twilio-trunk,60)
 same => n,Hangup()

; === Outbound via Twilio Trunk — Secure TLS+SRTP ===

[outbound-via-twilio-secure]
exten => _+1NXXNXXXXXX,1,NoOp(Dialing ${EXTEN} via Twilio secure trunk)
 same => n,Dial(PJSIP/${EXTEN}@twilio-trunk-secure,60)
 same => n,Hangup()

exten => _1NXXNXXXXXX,1,NoOp(Dialing +${EXTEN} via Twilio secure trunk)
 same => n,Dial(PJSIP/+${EXTEN}@twilio-trunk-secure,60)
 same => n,Hangup()

; === Internal extensions (testing) ===

[internal]
exten => 100,1,Answer()
 same => n,Playback(hello-world)
 same => n,Hangup()
