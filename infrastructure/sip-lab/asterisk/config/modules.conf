; ABOUTME: Module loading configuration for SIP Lab Asterisk.
; ABOUTME: Uses autoload with targeted noloads to keep it simple while excluding unused channel drivers.

[modules]
autoload=yes

; Exclude channel drivers we don't need
noload => chan_iax2.so
noload => chan_mgcp.so
noload => chan_skinny.so
noload => chan_unistim.so
noload => chan_motif.so

; Exclude unused apps/resources
noload => res_hep.so
noload => res_hep_pjsip.so
noload => res_hep_rtcp.so
noload => res_phoneprov.so
noload => res_pjsip_phoneprov_provider.so
noload => res_adsi.so
noload => res_smdi.so
