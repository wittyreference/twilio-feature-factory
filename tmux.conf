# Status bar - violet theme
set -g status-style 'bg=colour55,fg=colour255'
set -g window-status-current-style 'bg=colour93,fg=colour255,bold'

# Pane borders - active pane is unmistakable
set -g pane-active-border-style 'fg=colour201,bold'
set -g pane-border-style 'fg=colour236'
set -g pane-border-lines heavy
set -g pane-border-indicators colour

# Dim inactive panes, keep active pane bright
set -g window-style 'bg=colour234,fg=colour245'
set -g window-active-style 'bg=terminal'

set -g mouse on
